user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        server_tokens off;
        client_max_body_size 16M;
        keepalive_timeout 20s;
        sendfile on;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        set $cors_allowed_origin "*";
        add_header Access-Control-Allow-Origin $cors_allowed_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary Origin always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Serve Static Frontend Files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Auth Service Routing
        location /api/auth {
            limit_except GET POST OPTIONS PUT DELETE PATCH { deny all; }
            rewrite ^/api/auth/(.*)$ /api/$1 break;
            proxy_pass http://auth-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header X-Powered-By;
        }

        # Booking Service Routing
        location /api/bookings {
            limit_except GET POST OPTIONS PUT DELETE PATCH { deny all; }
            if ($uri = "/api/bookings") {
                rewrite ^ /api/bookings break;
            }
            rewrite ^/api/bookings/(.*)$ /api/$1 break;
            proxy_pass http://booking-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header X-Powered-By;
        }

        # Housekeeping Service Routing
        location /api/housekeeping {
            limit_except GET POST OPTIONS PUT DELETE PATCH { deny all; }
            rewrite ^/api/housekeeping/(.*)$ /api/$1 break;
            proxy_pass http://housekeeping-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header X-Powered-By;
        }

        # Finance Service Routing
        location /api/finance {
            limit_except GET POST OPTIONS PUT DELETE PATCH { deny all; }
            if ($uri = "/api/finance") {
                rewrite ^ /api/finance break;
            }
            rewrite ^/api/finance/(.*)$ /api/$1 break;
            proxy_pass http://finance-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header X-Powered-By;
        }
    }
}
