services:
  # =========================================================================
  # 1. DATABASE CONTAINERS (Isolated per microservice)
  # =========================================================================
  auth-db:
    image: mysql:8.0
    container_name: fe-auth-db
    restart: always
    environment:
      MYSQL_DATABASE: fe_auth_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: auth_user          # <--- ADD THIS
      MYSQL_PASSWORD: userpassword   # <--- ADD THIS
    ports:
      - "33061:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    networks:
      - fisherel-network

  booking-db:
    image: mysql:8.0
    container_name: fe-booking-db
    restart: always
    environment:
      MYSQL_DATABASE: fe_booking_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: booking_user       # <--- ADD THIS
      MYSQL_PASSWORD: userpassword   # <--- ADD THIS
    ports:
      - "33062:3306"
    volumes:
      - booking_db_data:/var/lib/mysql
    networks:
      - fisherel-network

  # [Do the same for housekeeping-db and finance-db...]

  # =========================================================================
  # 2. APPLICATION SERVICES (Laravel-based)
  # =========================================================================
  auth-service:
    # ... keep build settings ...
    environment:
      # ... keep app settings ...
      - DB_CONNECTION=mysql
      - DB_HOST=auth-db
      - DB_PORT=3306
      - DB_DATABASE=fe_auth_db
      - DB_USERNAME=auth_user        # <--- UPDATE THIS
      - DB_PASSWORD=userpassword     # <--- UPDATE THIS
    depends_on:
      - auth-db
    networks:
      - fisherel-network

  booking-service:
    # ... keep build settings ...
    environment:
      # ... keep app settings ...
      - DB_CONNECTION=mysql
      - DB_HOST=booking-db
      - DB_PORT=3306
      - DB_DATABASE=fe_booking_db
      - DB_USERNAME=booking_user     # <--- UPDATE THIS
      - DB_PASSWORD=userpassword     # <--- UPDATE THIS
    depends_on:
      - booking-db
    networks:
      - fisherel-network

  # [Do the same for housekeeping-service and finance-service...]
