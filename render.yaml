services:
- type: web
  name: api-gateway
  env: docker
  root: api-gateway
  dockerfilePath: api-gateway/Dockerfile
  branch: main
  plan: free
  healthCheckPath: /health
  envVars:
    AUTH_SERVICE_URL: https://api-gateway-example.onrender.com
    BOOKING_SERVICE_URL: https://api-gateway-example.onrender.com
    FINANCE_SERVICE_URL: https://api-gateway-example.onrender.com
    HOUSEKEEPING_SERVICE_URL: https://api-gateway-example.onrender.com
- type: web
  name: auth-service
  env: docker
  root: services/auth-service
  dockerfilePath: services/auth-service/Dockerfile
  branch: main
  plan: free
  healthCheckPath: /api/health
  envVars:
    APP_KEY: SET_IN_DASHBOARD
    DB_CONNECTION: mysql
    DB_HOST: SET_IN_DASHBOARD
    DB_PORT: '3306'
    DB_DATABASE: SET_IN_DASHBOARD
    DB_USERNAME: SET_IN_DASHBOARD
    DB_PASSWORD: SET_IN_DASHBOARD
    BOOKING_SERVICE_URL: https://auth-service-example.onrender.com
