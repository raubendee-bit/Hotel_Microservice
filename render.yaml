services:
  # =======================================================================
  # 1. BACKEND MICROSERVICES
  # =======================================================================
  - type: web
    name: fe-auth-service
    env: docker
    dockerfilePath: services/auth-service/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:fH7+9uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9z0=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: your-free-db-hostname.com  # 👈 Replace with your free cloud database host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: your_db_user
      - key: DB_PASSWORD
        value: your_db_password
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345

  - type: web
    name: fe-booking-service
    env: docker
    dockerfilePath: services/booking-service/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:qW8+5uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9a1=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: your-free-db-hostname.com
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: your_db_user
      - key: DB_PASSWORD
        value: your_db_password
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345
      - key: FINANCE_SERVICE_URL
        value: http://fe-finance-service

  - type: web
    name: fe-housekeeping-service
    env: docker
    dockerfilePath: services/housekeeping-service/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:zX3+5uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9b2=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: your-free-db-hostname.com
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: your_db_user
      - key: DB_PASSWORD
        value: your_db_password
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345
      - key: BOOKING_SERVICE_URL
        value: http://fe-booking-service

  - type: web
    name: fe-finance-service
    env: docker
    dockerfilePath: services/finance-service/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:cN4+5uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9c3=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: your-free-db-hostname.com
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: your_db_user
      - key: DB_PASSWORD
        value: your_db_password
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345

  # =======================================================================
  # 2. API GATEWAY ROUTER
  # =======================================================================
  - type: web
    name: fe-api-gateway
    env: docker
    dockerfilePath: api-gateway/Dockerfile

  # =======================================================================
  # 3. FRONTEND STATIC PORTAL
  # =======================================================================
  - type: web
    runtime: static
    name: fe-frontend
    staticPublishPath: .
