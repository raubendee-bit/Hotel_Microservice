services:
  - type: web
    name: api-gateway
    env: docker
    dockerfilePath: api-gateway/Dockerfile
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AUTH_SERVICE_URL
        value: https://api-gateway-example.onrender.com
      - key: BOOKING_SERVICE_URL
        value: https://booking-service-example.onrender.com
      - key: FINANCE_SERVICE_URL
        value: https://finance-service-example.onrender.com
      - key: HOUSEKEEPING_SERVICE_URL
        value: https://housekeeping-service-example.onrender.com

  - type: web
    name: auth-service
    env: docker
    dockerfilePath: services/auth-service/Dockerfile
    branch: main
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_KEY
        value: SET_IN_DASHBOARD
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: SET_IN_DASHBOARD
      - key: DB_PORT
        value: '3306'
      - key: DB_DATABASE
        value: SET_IN_DASHBOARD
      - key: DB_USERNAME
        value: SET_IN_DASHBOARD
      - key: DB_PASSWORD
        value: SET_IN_DASHBOARD
      - key: BOOKING_SERVICE_URL
        value: https://booking-service-example.onrender.com

  - type: web
    name: booking-service
    env: docker
    dockerfilePath: services/booking-service/Dockerfile
    branch: main
    plan: free
    healthCheckPath: /api/health
