        value: SET_IN_DASHBOARD
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: SET_IN_DASHBOARD
      - key: DB_PORT
        value: '3306'
      - key: DB_DATABASE
        value: SET_IN_DASHBOARD
      - key: DB_USERNAME
        value: SET_IN_DASHBOARD
      - key: DB_PASSWORD
        value: SET_IN_DASHBOARD
      - key: AUTH_SERVICE_URL
        value: https://auth-service-example.onrender.com

  - type: web
    name: finance-service
    env: docker
    dockerfilePath: services/finance-service/Dockerfile
    branch: main
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_KEY
        value: SET_IN_DASHBOARD
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: SET_IN_DASHBOARD
      - key: DB_PORT
        value: '3306'
      - key: DB_DATABASE
        value: SET_IN_DASHBOARD
      - key: DB_USERNAME
        value: SET_IN_DASHBOARD
      - key: DB_PASSWORD
        value: SET_IN_DASHBOARD
      - key: AUTH_SERVICE_URL
        value: https://auth-service-example.onrender.com

  - type: web
    name: housekeeping-service
    env: docker
    dockerfilePath: services/housekeeping-service/Dockerfile
    branch: main
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_KEY
        value: SET_IN_DASHBOARD
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: SET_IN_DASHBOARD
      - key: DB_PORT
        value: '3306'
      - key: DB_DATABASE
        value: SET_IN_DASHBOARD
