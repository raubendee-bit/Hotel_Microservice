# ============================================================
# 🚀 Render Blueprint — Fisher El Hotel ERP Suite
# ============================================================
# INSTRUCTIONS:
#   1. Push this file to the root of your GitHub repository.
#   2. Go to Render.com -> New+ -> Blueprint -> connect your repo.
#   3. Render will automatically create all services below.
# ============================================================

services:
  # =========================================================================
  # 1. UNIFIED MySQL DATABASE (Private — not publicly accessible)
  # =========================================================================
  - type: pserv
    name: fe-mysql-db
    plan: free
    env: docker
    image:
      url: docker.io/library/mysql:8.0
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: rootpassword
      - key: MYSQL_DATABASE
        value: fe_hotel_db
    # NOTE: Free tier has NO persistent disk.
    # Data resets if the service restarts. For persistent storage, upgrade to a paid plan.

  # =========================================================================
  # 2. AUTH MICROSERVICE
  # =========================================================================
  - type: pserv
    name: fe-auth-service
    plan: free
    env: docker
    dockerfilePath: services/auth-service/Dockerfile
    dockerContext: services/auth-service
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:fH7+9uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9z0=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: fe-mysql-db
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: rootpassword
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345

  # =========================================================================
  # 3. BOOKING MICROSERVICE
  # =========================================================================
  - type: pserv
    name: fe-booking-service
    plan: free
    env: docker
    dockerfilePath: services/booking-service/Dockerfile
    dockerContext: services/booking-service
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:qW8+5uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9a1=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: fe-mysql-db
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: rootpassword
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345
      - key: FINANCE_SERVICE_URL
        value: http://fe-finance-service

  # =========================================================================
  # 4. HOUSEKEEPING MICROSERVICE
  # =========================================================================
  - type: pserv
    name: fe-housekeeping-service
    plan: free
    env: docker
    dockerfilePath: services/housekeeping-service/Dockerfile
    dockerContext: services/housekeeping-service
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:zX3+5uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9b2=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: fe-mysql-db
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: rootpassword
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345
      - key: BOOKING_SERVICE_URL
        value: http://fe-booking-service

  # =========================================================================
  # 5. FINANCE MICROSERVICE
  # =========================================================================
  - type: pserv
    name: fe-finance-service
    plan: free
    env: docker
    dockerfilePath: services/finance-service/Dockerfile
    dockerContext: services/finance-service
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:cN4+5uO5Yl6sC3/lWq5iU/0j1t2r3s4e5v6w7x8y9c3=
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: fe-mysql-db
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fe_hotel_db
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: rootpassword
      - key: JWT_SECRET
        value: fisherel_jwt_secret_key_extremely_secure_key_12345

  # =========================================================================
  # 6. API GATEWAY (Nginx Router — the only publicly accessible backend)
  # =========================================================================
  - type: web
    name: fe-api-gateway
    plan: free
    env: docker
    dockerfilePath: api-gateway/Dockerfile
    dockerContext: api-gateway

  # =========================================================================
  # 7. FRONTEND STATIC PORTAL
  # =========================================================================
  services:
  - type: web          #  Must always be 'web' for websites or APIs
    runtime: static    #  This is where you specify it's a static site!
    name: frontend-dashboard
    env: static
    buildCommand: ""   # Leave empty or add build script if using a framework
    publishDir: "."
